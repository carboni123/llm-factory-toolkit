name: LLM Toolkit CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    # Weekly dependency-compatibility check (Sunday 06:00 UTC)
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  quality:
    name: Quality Gates (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff format check
        run: uv run ruff format --check llm_factory_toolkit

      - name: Ruff lint
        run: uv run ruff check llm_factory_toolkit

      - name: MyPy (strict)
        run: uv run mypy llm_factory_toolkit

      - name: Unit tests with coverage
        run: uv run pytest --cov=llm_factory_toolkit --cov-fail-under=80 -m "not integration" tests -q
